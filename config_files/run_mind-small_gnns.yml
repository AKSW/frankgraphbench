experiment:
  dataset:
    name: mind-small
    item:
      path: datasets/mind-small/processed/item.csv
      extra_features: [category, subcategory, title, abstract, url]
    user:
      path: datasets/mind-small/processed/user.csv
    ratings:
      path: datasets/mind-small/processed/rating.csv
      timestamp: False
    # enrich:
    #   map_path: datasets/mind-small/processed/map.csv
    #   enrich_path: datasets/mind-small/processed/enriched.csv
    #   remove_unmatched: False
    #   properties: [label, type, wikidata_id]

  preprocess:
    # - method: filter_by_rating
    #   parameters:
    #     threshold: 20
    # - method: binarize
    #   parameters:
    #     threshold: 4
    - method: filter_kcore
      parameters:
        k: 20
        iterations: 1
        target: user # user or rating

  split:
    seed: 42
    # test:
    #   method: random_by_ratio
    #   level: global
    #   p: 0.2
    # validation:
    #   method: random_by_ratio
    #   level: global
    #   p: 0.2

    # test:
    #   method: timestamp_by_ratio
    #   level: user
    #   p: 0.1
    # validation:
    #   level: user
    #   method: timestamp_by_ratio
    #   p: 0.2

    # test:
    #   method: fixed_timestamp
    #   # type: global_level
    #   timestamp: 890000000
    # validation:
    #   method: fixed_timestamp
    #   timestamp: 880000000

    test:
      method: k_fold
      k: 5
      level: "user"

  models:
    - name: bPRMF
      config:
        save_weights: True
      parameters:
        embed_size: 64
        epoch: 1000
        verbose: 10
        validate_factor: 200 # 200 for ml-1m and mind-small 50 for others
        validate_frac: .0001  # .0001 for ml-1m and mind-small .001 for others
        test_flag: sort
    # - name: cFKG
    #   config:
    #     save_weights: True
    #   parameters:
    #     embed_size: 64
    #     epoch: 1000
    #     verbose: 10
    #     validate_factor: 200 # 200 for ml-1m and mind-small 50 for others
    #     validate_frac: .0001  # .0001 for ml-1m and mind-small .001 for others
    #     test_flag: sort
    # - name: cKE
    #   config:
    #     save_weights: True
    #   parameters:
    #     embed_size: 64
    #     epoch: 1000
    #     verbose: 10
    #     validate_factor: 200 # 200 for ml-1m and mind-small 50 for others
    #     validate_frac: .0001  # .0001 for ml-1m and mind-small .001 for others
    #     test_flag: sort
    # - name: kGAT
    #   config:
    #     save_weights: True
    #   parameters:
    #     embed_size: 64
    #     epoch: 1000
    #     verbose: 10
    #     validate_factor: 200 # 200 for ml-1m and mind-small 50 for others
    #     validate_frac: .0001  # .0001 for ml-1m and mind-small .001 for others
        # test_flag: sort

  evaluation:
    k: 10
    relevance_threshold: 0
    metrics: [MAP, nDCG]

  report:
    file: "experiment_results/mind/mind-small_bPRMF.csv"
    execution_times:
      file: "experiment_results/mind/mind-small_bPRMF_times.csv"