experiment:
  dataset:
    name: mind-small
    item:
      path: datasets/mind-small/processed/item.csv
      extra_features: [category, subcategory, title, abstract, url]
    user:
      path: datasets/mind-small/processed/user.csv
    ratings:
      path: datasets/mind-small/processed/rating.csv
      timestamp: False

  preprocess:
    # - method: filter_by_rating
    #   parameters:
    #     threshold: 20
    # - method: binarize
    #   parameters:
    #     threshold: 4
    - method: filter_kcore
      parameters:
        k: 20
        iterations: 1
        target: user # user or rating

  split:
    seed: 42
    # test:
    #   method: random_by_ratio
    #   level: global
    #   p: 0.2
    # validation:
    #   method: random_by_ratio
    #   level: global
    #   p: 0.2

    # test:
    #   method: timestamp_by_ratio
    #   level: user
    #   p: 0.1
    # validation:
    #   level: user
    #   method: timestamp_by_ratio
    #   p: 0.2

    # test:
    #   method: fixed_timestamp
    #   # type: global_level
    #   timestamp: 890000000
    # validation:
    #   method: fixed_timestamp
    #   timestamp: 880000000

    test:
      method: k_fold
      k: 5
      level: "user"

  models:
    - name: ePHEN
      config:
        save_weights: True
      parameters:
        embedding_model: sentence-transformers/all-mpnet-base-v2
        embed_with: movie_title
        iterations: 30
        mi: 0.5

  evaluation:
    k: 10
    relevance_threshold: 0
    metrics: [MAP, nDCG]

  report:
    file: "experiment_results/mind/ephen.csv"
    execution_times:
      file: "experiment_results/mind/ephen_times.csv"
